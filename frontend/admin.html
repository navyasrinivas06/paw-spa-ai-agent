<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paw Spa & Nest - Admin Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f5f7fb;
        }

        .header {
            background: #2f6fed;
            color: white;
            padding: 18px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 {
            font-size: 28px;
        }

        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }

        .logout-btn:hover {
            background: #bb2d3b;
        }

        .container {
            width: 95%;
            max-width: 1400px;
            margin: 30px auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,.1);
        }

        th {
            background: #2f6fed;
            color: white;
            padding: 14px;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background: #f2f2f2;
        }

        .delete-btn {
            background: crimson;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        .delete-btn:hover {
            background: darkred;
        }
    </style>
</head>

<body>

<script>
if(localStorage.getItem("adminLoggedIn") !== "true"){
    window.location.href = "login.html";
}
</script>

<div class="header">
    <h2>🐾 Paw Spa & Nest - Admin Dashboard</h2>

    <button class="logout-btn" onclick="logout()">
        Logout
    </button>
</div>

<div class="container">

    <div class="cards">

    <div class="card">
        <h3>Total Bookings</h3>
        <h1 id="totalBookings">0</h1>
    </div>

    <div class="card">
        <h3>Today's Bookings</h3>
        <h1 id="todayBookings">0</h1>
    </div>

    <div class="card">
        <h3>Grooming</h3>
        <h1 id="groomingBookings">0</h1>
    </div>

    <div class="card">
        <h3>Boarding</h3>
        <h1 id="boardingBookings">0</h1>
    </div>

</div>

<table>

<thead>

<tr>
<th>ID</th>
<th>Owner</th>
<th>Phone</th>
<th>Pet</th>
<th>Type</th>
<th>Breed</th>
<th>Service</th>
<th>Date</th>
<th>Time</th>
<th>Action</th>
</tr>

</thead>

<tbody id="bookingTable">

</tbody>

</table>

</div>

<script>

const API="https://paw-spa-ai-agent.onrender.com";

async function loadBookings(){

const response=await fetch(API+"/bookings");

const data=await response.json();

document.getElementById("totalBookings").textContent = data.length;

const today = new Date().toLocaleDateString("en-GB").replace(/\//g, "-");

let todayCount = 0;
let grooming = 0;
let boarding = 0;

data.forEach(b => {

    if (b.date === today)
        todayCount++;

    if (b.service.toLowerCase().includes("groom"))
        grooming++;

    if (b.service.toLowerCase().includes("board"))
        boarding++;

});

document.getElementById("todayBookings").textContent = todayCount;
document.getElementById("groomingBookings").textContent = grooming;
document.getElementById("boardingBookings").textContent = boarding;

const table=document.getElementById("bookingTable");

table.innerHTML="";

data.forEach((booking)=>{

table.innerHTML+=`

<tr>

<td>${booking.id}</td>

<td>${booking.name}</td>

<td>${booking.phone}</td>

<td>${booking.pet_name}</td>

<td>${booking.pet_type}</td>

<td>${booking.breed}</td>

<td>${booking.service}</td>

<td>${booking.date}</td>

<td>${booking.time}</td>

<td>

<button
class="delete-btn"
onclick="deleteBooking(${booking.id})">

Delete

</button>

</td>

</tr>

`;

});

}

async function deleteBooking(id){

if(!confirm("Delete this booking?"))
return;

await fetch(API+"/book/"+id,{
method:"DELETE"
});

loadBookings();

}

function logout(){

localStorage.removeItem("adminLoggedIn");

window.location.href="login.html";

}

loadBookings();

</script>

</body>
</html>
